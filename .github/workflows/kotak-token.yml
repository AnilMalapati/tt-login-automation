name: Kotak Neo V3 Token Regeneration

on:
  schedule:
    # 3:00 AM UTC = 8:30 AM IST, weekdays (Mon–Fri)
    - cron: '0 3 * * 1-5'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  regenerate-token:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome + ChromeDriver
        uses: browser-actions/setup-chrome@v1

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Regenerate Kotak Neo V3 token
        env:
          TRADETRON_EMAIL: ${{ secrets.TRADETRON_EMAIL }}
          TRADETRON_PASSWORD: ${{ secrets.TRADETRON_PASSWORD }}
          REGEN_TOKEN_URL: ${{ secrets.REGEN_TOKEN_URL }}
        run: python kotakneo_autologin.py --force
